<div class="main-content">
    <div class="header-title">
        <h1>Gestión de Personal</h1>
        <p>Registre y asigne roles a los nuevos colaboradores del sistema.</p>
    </div>

    <div class="card" style="max-width: 600px;">
        <h3>Nuevo Registro de Usuario</h3>
        <form action="procesar_registro.php" method="POST">
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" name="nombre" placeholder="Ej. Jaquelin Jennifer" required>
            </div>
            
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" name="email" placeholder="usuario@uaemex.mx" required>
            </div>

            <div class="form-group">
                <label>Rol en el Sistema</label>
                <select name="rol" required>
                    <option value="">Seleccione un rol...</option>
                    <option value="gerente">Gerente Financiero</option>
                    <option value="contador">Contador</option>
                    <option value="supervisor">Supervisor de Ventas</option>
                </select>
            </div>

            <div class="form-group">
                <label>Contraseña Temporal</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn-submit">Registrar Personal Autorizado</button>
        </form>
    </div>
</div>
