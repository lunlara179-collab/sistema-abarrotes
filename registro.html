<div class="container">
    <div class="glass-card">
        <h2 style="color: var(--btn-color); margin-top: 0;">Registro de Personal Autorizado</h2>
        <p>Complete los datos para otorgar acceso según el rol correspondiente.</p>
        
        <form action="db_save_user.php" method="POST" class="form-grid">
            <div class="full-width">
                <label>Nombre del Colaborador</label>
                <input type="text" name="usuario_nombre" placeholder="Nombre completo" required>
            </div>

            <div>
                <label>Correo Institucional</label>
                <input type="email" name="usuario_email" placeholder="ejemplo@uaemex.mx" required>
            </div>

            <div>
                <label>Rol Asignado (Módulo de Permisos)</label>
                <select name="usuario_rol" required>
                    <option value="">Seleccione un rol...</option>
                    <option value="gerente">Gerente Financiero</option>
                    <option value="contador">Contador</option>
                    <option value="supervisor">Supervisor de Ventas</option>
                </select>
            </div>

            <div class="full-width">
                <label>Contraseña de Acceso</label>
                <input type="password" name="usuario_pass" placeholder="Mínimo 8 caracteres" required>
            </div>

            <div class="full-width" style="margin-top: 10px;">
                <label>Notas Adicionales</label>
                <textarea rows="3" placeholder="Departamento o área específica..."></textarea>
            </div>

            <div class="full-width">
                <button type="submit" class="btn-main">Finalizar Registro de Usuario</button>
            </div>
        </form>
    </div>
</div>
