<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Personal</title>

    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #6366f1;
            --dark: #1e293b;
            --light: #f8fafc;
            --glass: rgba(255,255,255,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(120deg, #1e3a8a, #4f46e5);
            min-height: 100vh;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background: #0f172a;
            color: white;
            padding: 30px 20px;
            height: 100vh;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 40px;
            color: #6366f1;
        }

        .nav-link {
            display: block;
            padding: 12px;
            margin: 10px 0;
            text-decoration: none;
            color: white;
            border-radius: 8px;
            transition: 0.3s;
        }

        .nav-link:hover {
            background: #6366f1;
        }

        .active {
            background: #4f46e5;
        }

        /* CONTENEDOR */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* TARJETA */
        .glass-card {
            width: 700px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .glass-card h2 {
            margin-bottom: 10px;
            color: #f1f5f9;
        }

        .glass-card p {
            margin-bottom: 20px;
            color: #e2e8f0;
        }

        /* FORMULARIO */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.9);
        }

        textarea {
            resize: none;
        }

        /* BOTON */
        .btn-main {
            background: #22c55e;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-main:hover {
            background: #16a34a;
            transform: scale(1.03);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .full-width {
                grid-column: span 1;
            }

            .sidebar {
                display: none;
            }
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>SIG "El Progreso"</h2>

        <a href="index.html" class="nav-link">🏠 Panel de Control</a>
        <a href="usuarios.html" class="nav-link active">👥 Gestión de Personal</a>
    </div>

    <!-- CONTENEDOR -->
    <div class="container">

        <div class="glass-card">

            <h2>Registro de Personal Autorizado</h2>
            <p>Complete los datos para otorgar acceso según el rol correspondiente.</p>

            <form action="db_save_user.php" method="POST" class="form-grid">

                <div class="full-width">
                    <label>👤 Nombre del Colaborador</label>
                    <input type="text" name="usuario_nombre" placeholder="Nombre completo" required>
                </div>

                <div>
                    <label>📧 Correo Institucional</label>
                    <input type="email" name="usuario_email" placeholder="ejemplo@uaemex.mx" required>
                </div>

                <div>
                    <label>🛡️ Rol Asignado</label>
                    <select name="usuario_rol" required>
                        <option value="">Seleccione un rol</option>
                        <option value="gerente">Gerente Financiero</option>
                        <option value="contador">Contador</option>
                        <option value="supervisor">Supervisor de Ventas</option>
                    </select>
                </div>

                <div class="full-width">
                    <label>🔐 Contraseña de Acceso</label>
                    <input type="password" name="usuario_pass" placeholder="Mínimo 8 caracteres" required>
                </div>

                <div class="full-width">
                    <label>📝 Notas Adicionales</label>
                    <textarea rows="3" placeholder="Departamento o área específica..."></textarea>
                </div>

                <div class="full-width">
                    <button type="submit" class="btn-main">
                        ✔ Finalizar Registro de Usuario
                    </button>
                </div>

            </form>
        </div>

    </div>

</body>
</html>
